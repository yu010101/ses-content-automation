name: Daily SES Content Pipeline

on:
  # Schedule disabled — local crontab runs pipeline at 08:00 JST with Playwright (Note.com)
  # schedule:
  #   - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publishing)"
        type: boolean
        default: false
      skip_approval:
        description: "Skip Telegram approval"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_URLNAME: "sescore"
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CI: "true"
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ inputs.skip_approval }}" = "true" ]; then
            FLAGS="$FLAGS --skip-approval"
          fi
          npx tsx src/index.ts pipeline $FLAGS

      - name: Commit published.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in data/published.json data/performance.json data/learning-state.json data/x-queue.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data files $(date +%Y-%m-%d)"
            git push
          fi
