name: Daily SES Content Pipeline

on:
  schedule:
    # UTC 0:00 = JST 9:00, weekdays only
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publishing)"
        type: boolean
        default: false
      skip_approval:
        description: "Skip Telegram approval"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CI: "true"
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ inputs.skip_approval }}" = "true" ]; then
            FLAGS="$FLAGS --skip-approval"
          fi
          npx tsx src/index.ts pipeline $FLAGS

      - name: Commit Zenn article & published.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ data/published.json
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "Add daily SES article $(date +%Y-%m-%d)"
            git push
          fi
